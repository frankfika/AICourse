<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Floating elements -->
  <circle cx="100" cy="80" r="40" fill="rgba(255,255,255,0.1)"/>
  <circle cx="700" cy="100" r="50" fill="rgba(255,255,255,0.08)"/>
  <circle cx="750" cy="500" r="35" fill="rgba(255,255,255,0.12)"/>
  <circle cx="80" cy="520" r="45" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Main card -->
  <rect x="50" y="80" width="700" height="440" rx="25" fill="url(#card)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  
  <!-- Deep Neural Network -->
  <g transform="translate(100, 150)">
    <!-- Input layer -->
    <g>
      <circle cx="0" cy="0" r="12" fill="#4facfe"/>
      <circle cx="0" cy="30" r="12" fill="#4facfe"/>
      <circle cx="0" cy="60" r="12" fill="#4facfe"/>
      <circle cx="0" cy="90" r="12" fill="#4facfe"/>
      <text x="0" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">输入层</text>
    </g>
    
    <!-- Hidden layer 1 -->
    <g transform="translate(80, 0)">
      <circle cx="0" cy="0" r="12" fill="#00f2fe"/>
      <circle cx="0" cy="30" r="12" fill="#00f2fe"/>
      <circle cx="0" cy="60" r="12" fill="#00f2fe"/>
      <circle cx="0" cy="90" r="12" fill="#00f2fe"/>
      <circle cx="0" cy="120" r="12" fill="#00f2fe"/>
      <text x="0" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">隐藏层1</text>
    </g>
    
    <!-- Hidden layer 2 -->
    <g transform="translate(160, 15)">
      <circle cx="0" cy="0" r="12" fill="#667eea"/>
      <circle cx="0" cy="30" r="12" fill="#667eea"/>
      <circle cx="0" cy="60" r="12" fill="#667eea"/>
      <circle cx="0" cy="90" r="12" fill="#667eea"/>
      <text x="0" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">隐藏层2</text>
    </g>
    
    <!-- Hidden layer 3 -->
    <g transform="translate(240, 30)">
      <circle cx="0" cy="0" r="12" fill="#4facfe"/>
      <circle cx="0" cy="30" r="12" fill="#4facfe"/>
      <circle cx="0" cy="60" r="12" fill="#4facfe"/>
      <text x="0" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">隐藏层3</text>
    </g>
    
    <!-- Output layer -->
    <g transform="translate(320, 45)">
      <circle cx="0" cy="0" r="12" fill="#00f2fe"/>
      <circle cx="0" cy="30" r="12" fill="#00f2fe"/>
      <text x="0" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">输出层</text>
    </g>
    
    <!-- Connections -->
    <g stroke="rgba(79, 172, 254, 0.3)" stroke-width="1">
      <!-- Input to Hidden 1 -->
      <line x1="0" y1="0" x2="80" y2="0"/>
      <line x1="0" y1="30" x2="80" y2="30"/>
      <line x1="0" y1="60" x2="80" y2="60"/>
      <line x1="0" y1="90" x2="80" y2="90"/>
      
      <!-- Hidden 1 to Hidden 2 -->
      <line x1="80" y1="0" x2="160" y2="15"/>
      <line x1="80" y1="30" x2="160" y2="45"/>
      <line x1="80" y1="60" x2="160" y2="75"/>
      <line x1="80" y1="90" x2="160" y2="105"/>
      <line x1="80" y1="120" x2="160" y2="105"/>
      
      <!-- Hidden 2 to Hidden 3 -->
      <line x1="160" y1="15" x2="240" y2="30"/>
      <line x1="160" y1="45" x2="240" y2="60"/>
      <line x1="160" y1="75" x2="240" y2="90"/>
      <line x1="160" y1="105" x2="240" y2="90"/>
      
      <!-- Hidden 3 to Output -->
      <line x1="240" y1="30" x2="320" y2="45"/>
      <line x1="240" y1="60" x2="320" y2="75"/>
      <line x1="240" y1="90" x2="320" y2="45"/>
    </g>
  </g>
  
  <!-- Deep Learning Frameworks -->
  <g transform="translate(500, 150)">
    <!-- PyTorch -->
    <rect x="0" y="0" width="80" height="40" rx="8" fill="#ee7752" opacity="0.8"/>
    <text x="40" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">PyTorch</text>
    
    <!-- TensorFlow -->
    <rect x="100" y="0" width="80" height="40" rx="8" fill="#ff6b6b" opacity="0.8"/>
    <text x="140" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">TensorFlow</text>
    
    <!-- Keras -->
    <rect x="0" y="60" width="80" height="40" rx="8" fill="#4facfe" opacity="0.8"/>
    <text x="40" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">Keras</text>
    
    <!-- JAX -->
    <rect x="100" y="60" width="80" height="40" rx="8" fill="#00f2fe" opacity="0.8"/>
    <text x="140" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">JAX</text>
  </g>
  
  <!-- Mathematical formulas -->
  <g transform="translate(100, 350)">
    <text x="0" y="0" font-family="serif" font-size="14" fill="#4facfe" font-weight="bold">反向传播: ∇θ = ∂L/∂θ</text>
    <text x="0" y="25" font-family="serif" font-size="14" fill="#00f2fe" font-weight="bold">激活函数: σ(x) = 1/(1 + e^(-x))</text>
    <text x="0" y="50" font-family="serif" font-size="14" fill="#667eea" font-weight="bold">损失函数: L = -∑y log(ŷ)</text>
  </g>
  
  <!-- Certification Badge -->
  <g transform="translate(500, 300)">
    <circle cx="100" cy="100" r="80" fill="url(#bg)" stroke="#ffd700" stroke-width="4"/>
    <circle cx="100" cy="100" r="60" fill="white" opacity="0.9"/>
    <text x="100" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#4facfe">DL</text>
    <text x="100" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#00f2fe">大师</text>
    <text x="100" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">认证</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2d3748">深度学习大师课程</text>
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#4a5568">掌握最前沿的深度学习技术</text>
  
  <!-- Course badge -->
  <rect x="320" y="520" width="160" height="40" rx="20" fill="#4facfe"/>
  <text x="400" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Nano Degree</text>
</svg>
