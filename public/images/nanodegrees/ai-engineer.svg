<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Floating elements -->
  <circle cx="100" cy="80" r="40" fill="rgba(255,255,255,0.1)"/>
  <circle cx="700" cy="100" r="50" fill="rgba(255,255,255,0.08)"/>
  <circle cx="750" cy="500" r="35" fill="rgba(255,255,255,0.12)"/>
  <circle cx="80" cy="520" r="45" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Main card -->
  <rect x="50" y="80" width="700" height="440" rx="25" fill="url(#card)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  
  <!-- AI Brain visualization -->
  <g transform="translate(150, 150)">
    <!-- Brain outline -->
    <path d="M 50 50 Q 30 30 50 10 Q 80 0 120 10 Q 140 20 150 40 Q 160 60 150 80 Q 140 100 120 110 Q 100 120 80 110 Q 60 100 50 80 Q 40 60 50 40 Q 50 30 50 50" 
          fill="none" stroke="#667eea" stroke-width="4"/>
    
    <!-- Neural connections -->
    <g stroke="#764ba2" stroke-width="2" opacity="0.6">
      <line x1="60" y1="40" x2="80" y2="50"/>
      <line x1="80" y1="50" x2="100" y2="45"/>
      <line x1="100" y1="45" x2="120" y2="55"/>
      <line x1="120" y1="55" x2="140" y2="50"/>
      <line x1="70" y1="60" x2="90" y2="70"/>
      <line x1="90" y1="70" x2="110" y2="65"/>
      <line x1="110" y1="65" x2="130" y2="75"/>
    </g>
    
    <!-- Data nodes -->
    <circle cx="60" cy="40" r="4" fill="#667eea"/>
    <circle cx="80" cy="50" r="4" fill="#764ba2"/>
    <circle cx="100" cy="45" r="4" fill="#667eea"/>
    <circle cx="120" cy="55" r="4" fill="#764ba2"/>
    <circle cx="140" cy="50" r="4" fill="#667eea"/>
    <circle cx="70" cy="60" r="4" fill="#764ba2"/>
    <circle cx="90" cy="70" r="4" fill="#667eea"/>
    <circle cx="110" cy="65" r="4" fill="#764ba2"/>
    <circle cx="130" cy="75" r="4" fill="#667eea"/>
  </g>
  
  <!-- AI Tools and Technologies -->
  <g transform="translate(400, 150)">
    <!-- Machine Learning -->
    <rect x="0" y="0" width="80" height="40" rx="8" fill="#667eea" opacity="0.8"/>
    <text x="40" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">机器学习</text>
    
    <!-- Deep Learning -->
    <rect x="100" y="0" width="80" height="40" rx="8" fill="#764ba2" opacity="0.8"/>
    <text x="140" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">深度学习</text>
    
    <!-- NLP -->
    <rect x="200" y="0" width="80" height="40" rx="8" fill="#f093fb" opacity="0.8"/>
    <text x="240" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">自然语言</text>
    
    <!-- Computer Vision -->
    <rect x="0" y="60" width="80" height="40" rx="8" fill="#4facfe" opacity="0.8"/>
    <text x="40" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">计算机视觉</text>
    
    <!-- Reinforcement Learning -->
    <rect x="100" y="60" width="80" height="40" rx="8" fill="#00f2fe" opacity="0.8"/>
    <text x="140" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">强化学习</text>
    
    <!-- MLOps -->
    <rect x="200" y="60" width="80" height="40" rx="8" fill="#ffecd2" opacity="0.8"/>
    <text x="240" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">MLOps</text>
  </g>
  
  <!-- Certification Badge -->
  <g transform="translate(300, 300)">
    <circle cx="100" cy="100" r="80" fill="url(#bg)" stroke="#ffd700" stroke-width="4"/>
    <circle cx="100" cy="100" r="60" fill="white" opacity="0.9"/>
    <text x="100" y="90" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#667eea">AI</text>
    <text x="100" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#764ba2">工程师</text>
    <text x="100" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">认证</text>
  </g>
  
  <!-- Title -->
  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2d3748">AI 工程师认证课程</text>
  <text x="400" y="485" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#4a5568">全面的AI技能体系，助你成为AI领域专家</text>
  
  <!-- Course badge -->
  <rect x="320" y="520" width="160" height="40" rx="20" fill="#667eea"/>
  <text x="400" y="545" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white">Nano Degree</text>
</svg>
