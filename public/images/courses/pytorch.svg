<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ee7752;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e73c7e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Floating elements -->
  <circle cx="100" cy="90" r="30" fill="rgba(255,255,255,0.1)"/>
  <circle cx="700" cy="110" r="40" fill="rgba(255,255,255,0.08)"/>
  <circle cx="750" cy="490" r="35" fill="rgba(255,255,255,0.12)"/>
  <circle cx="70" cy="510" r="45" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Main card -->
  <rect x="50" y="100" width="700" height="400" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- PyTorch logo elements -->
  <!-- Torch flame -->
  <path d="M 200 200 Q 200 180 220 180 Q 240 180 240 200 Q 240 220 220 240 Q 200 240 200 220 Q 200 200 200 200" fill="#ee7752"/>
  <path d="M 220 180 Q 220 160 240 160 Q 260 160 260 180 Q 260 200 240 220 Q 220 200 220 180" fill="#e73c7e" opacity="0.7"/>
  
  <!-- Neural network with PyTorch tensors -->
  <g stroke="#ee7752" stroke-width="2" fill="none">
    <!-- Input layer -->
    <circle cx="350" cy="200" r="15" fill="#ee7752"/>
    <circle cx="350" cy="230" r="15" fill="#ee7752"/>
    <circle cx="350" cy="260" r="15" fill="#ee7752"/>
    
    <!-- Hidden layer -->
    <circle cx="450" cy="210" r="15" fill="#e73c7e"/>
    <circle cx="450" cy="240" r="15" fill="#e73c7e"/>
    <circle cx="450" cy="270" r="15" fill="#e73c7e"/>
    
    <!-- Output layer -->
    <circle cx="550" cy="220" r="15" fill="#ee7752"/>
    <circle cx="550" cy="250" r="15" fill="#ee7752"/>
    
    <!-- Connections -->
    <line x1="350" y1="200" x2="450" y2="210"/>
    <line x1="350" y1="230" x2="450" y2="240"/>
    <line x1="350" y1="260" x2="450" y2="270"/>
    <line x1="450" y1="210" x2="550" y2="220"/>
    <line x1="450" y1="240" x2="550" y2="250"/>
  </g>
  
  <!-- Code snippet -->
  <rect x="150" y="320" width="500" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="170" y="345" font-family="monospace" font-size="12" fill="#10b981">import torch</text>
  <text x="170" y="365" font-family="monospace" font-size="12" fill="#10b981">import torch.nn as nn</text>
  <text x="170" y="385" font-family="monospace" font-size="12" fill="#fbbf24">model = nn.Sequential(</text>
  <text x="190" y="405" font-family="monospace" font-size="12" fill="#fbbf24">    nn.Linear(784, 128),</text>
  <text x="190" y="425" font-family="monospace" font-size="12" fill="#fbbf24">    nn.ReLU(),</text>
  <text x="190" y="445" font-family="monospace" font-size="12" fill="#fbbf24">    nn.Linear(128, 10)</text>
  <text x="170" y="465" font-family="monospace" font-size="12" fill="#fbbf24">)</text>
  
  <!-- Title -->
  <text x="400" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2d3748">PyTorch 实战教程</text>
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4a5568">深度学习框架实践</text>
  
  <!-- Course badge -->
  <rect x="320" y="520" width="160" height="30" rx="15" fill="#ee7752"/>
  <text x="400" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">PyTorch</text>
</svg>
