<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Floating elements -->
  <circle cx="100" cy="90" r="30" fill="rgba(255,255,255,0.1)"/>
  <circle cx="700" cy="110" r="40" fill="rgba(255,255,255,0.08)"/>
  <circle cx="750" cy="490" r="35" fill="rgba(255,255,255,0.12)"/>
  <circle cx="70" cy="510" r="45" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Main card -->
  <rect x="50" y="100" width="700" height="400" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Camera icon -->
  <g transform="translate(200, 200)">
    <rect x="0" y="20" width="80" height="60" rx="10" fill="#4a90e2" stroke="#2c5aa0" stroke-width="2"/>
    <circle cx="40" cy="50" r="25" fill="#2c5aa0"/>
    <circle cx="40" cy="50" r="15" fill="#87ceeb"/>
    <rect x="70" y="30" width="15" height="40" rx="5" fill="#4a90e2"/>
    <rect x="10" y="10" width="20" height="15" rx="3" fill="#2c5aa0"/>
  </g>
  
  <!-- Image processing pipeline -->
  <!-- Original image -->
  <rect x="350" y="180" width="80" height="60" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="2"/>
  <circle cx="370" cy="200" r="8" fill="#4a90e2"/>
  <circle cx="390" cy="220" r="6" fill="#4a90e2"/>
  <circle cx="410" cy="200" r="10" fill="#4a90e2"/>
  <text x="350" y="260" font-family="Arial, sans-serif" font-size="12" fill="#666">原始图像</text>
  
  <!-- Arrow -->
  <path d="M 440 210 L 460 210" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Processed image -->
  <rect x="480" y="180" width="80" height="60" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="2"/>
  <rect x="490" y="190" width="20" height="20" fill="#4a90e2"/>
  <rect x="520" y="190" width="20" height="20" fill="#4a90e2"/>
  <rect x="490" y="220" width="20" height="20" fill="#4a90e2"/>
  <rect x="520" y="220" width="20" height="20" fill="#4a90e2"/>
  <text x="480" y="260" font-family="Arial, sans-serif" font-size="12" fill="#666">处理后</text>
  
  <!-- Detection boxes -->
  <rect x="350" y="300" width="200" height="80" fill="#f0f9ff" stroke="#0ea5e9" stroke-width="2" rx="5"/>
  <rect x="360" y="310" width="60" height="40" fill="none" stroke="#ef4444" stroke-width="2" stroke-dasharray="3,3"/>
  <rect x="440" y="320" width="50" height="30" fill="none" stroke="#10b981" stroke-width="2" stroke-dasharray="3,3"/>
  <rect x="510" y="315" width="40" height="35" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="350" y="400" font-family="Arial, sans-serif" font-size="12" fill="#666">目标检测结果</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2d3748">计算机视觉</text>
  <text x="400" y="530" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4a5568">图像识别与目标检测</text>
  
  <!-- Course badge -->
  <rect x="320" y="550" width="160" height="30" rx="15" fill="#4a90e2"/>
  <text x="400" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">计算机视觉</text>
</svg>
