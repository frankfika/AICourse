<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Floating elements -->
  <circle cx="120" cy="80" r="35" fill="rgba(255,255,255,0.1)"/>
  <circle cx="680" cy="120" r="45" fill="rgba(255,255,255,0.08)"/>
  <circle cx="750" cy="480" r="25" fill="rgba(255,255,255,0.12)"/>
  <circle cx="80" cy="520" r="40" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Main card -->
  <rect x="50" y="100" width="700" height="400" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Deep neural network layers -->
  <!-- Input layer -->
  <circle cx="150" cy="200" r="12" fill="#4facfe"/>
  <circle cx="150" cy="230" r="12" fill="#4facfe"/>
  <circle cx="150" cy="260" r="12" fill="#4facfe"/>
  <circle cx="150" cy="290" r="12" fill="#4facfe"/>
  
  <!-- Hidden layer 1 -->
  <circle cx="250" cy="180" r="12" fill="#00f2fe"/>
  <circle cx="250" cy="210" r="12" fill="#00f2fe"/>
  <circle cx="250" cy="240" r="12" fill="#00f2fe"/>
  <circle cx="250" cy="270" r="12" fill="#00f2fe"/>
  <circle cx="250" cy="300" r="12" fill="#00f2fe"/>
  
  <!-- Hidden layer 2 -->
  <circle cx="350" cy="190" r="12" fill="#4facfe"/>
  <circle cx="350" cy="220" r="12" fill="#4facfe"/>
  <circle cx="350" cy="250" r="12" fill="#4facfe"/>
  <circle cx="350" cy="280" r="12" fill="#4facfe"/>
  
  <!-- Hidden layer 3 -->
  <circle cx="450" cy="200" r="12" fill="#00f2fe"/>
  <circle cx="450" cy="230" r="12" fill="#00f2fe"/>
  <circle cx="450" cy="260" r="12" fill="#00f2fe"/>
  
  <!-- Output layer -->
  <circle cx="550" cy="220" r="12" fill="#4facfe"/>
  <circle cx="550" cy="260" r="12" fill="#4facfe"/>
  
  <!-- Neural network connections -->
  <g stroke="rgba(79, 172, 254, 0.4)" stroke-width="2">
    <!-- Input to Hidden 1 -->
    <line x1="150" y1="200" x2="250" y2="180"/>
    <line x1="150" y1="230" x2="250" y2="210"/>
    <line x1="150" y1="260" x2="250" y2="240"/>
    <line x1="150" y1="290" x2="250" y2="270"/>
    
    <!-- Hidden 1 to Hidden 2 -->
    <line x1="250" y1="180" x2="350" y2="190"/>
    <line x1="250" y1="210" x2="350" y2="220"/>
    <line x1="250" y1="240" x2="350" y2="250"/>
    <line x1="250" y1="270" x2="350" y2="280"/>
    <line x1="250" y1="300" x2="350" y2="250"/>
    
    <!-- Hidden 2 to Hidden 3 -->
    <line x1="350" y1="190" x2="450" y2="200"/>
    <line x1="350" y1="220" x2="450" y2="230"/>
    <line x1="350" y1="250" x2="450" y2="260"/>
    <line x1="350" y1="280" x2="450" y2="230"/>
    
    <!-- Hidden 3 to Output -->
    <line x1="450" y1="200" x2="550" y2="220"/>
    <line x1="450" y1="230" x2="550" y2="260"/>
    <line x1="450" y1="260" x2="550" y2="240"/>
  </g>
  
  <!-- Mathematical formulas -->
  <text x="100" y="380" font-family="serif" font-size="14" fill="rgba(79, 172, 254, 0.8)">f(x) = σ(Wx + b)</text>
  <text x="100" y="400" font-family="serif" font-size="14" fill="rgba(0, 242, 254, 0.8)">L = -∑y log(ŷ)</text>
  <text x="100" y="420" font-family="serif" font-size="14" fill="rgba(79, 172, 254, 0.8)">∇θ = ∂L/∂θ</text>
  
  <!-- Title -->
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2d3748">深度学习与神经网络</text>
  <text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4a5568">深度探索AI的核心技术</text>
  
  <!-- Course badge -->
  <rect x="320" y="450" width="160" height="30" rx="15" fill="#4facfe"/>
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">深度学习</text>
</svg>
