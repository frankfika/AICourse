<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffecd2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcb69f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Floating elements -->
  <circle cx="120" cy="80" r="35" fill="rgba(255,255,255,0.1)"/>
  <circle cx="680" cy="120" r="40" fill="rgba(255,255,255,0.08)"/>
  <circle cx="750" cy="480" r="30" fill="rgba(255,255,255,0.12)"/>
  <circle cx="80" cy="520" r="45" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Main card -->
  <rect x="50" y="100" width="700" height="400" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Agent and Environment -->
  <!-- Agent (robot) -->
  <rect x="200" y="200" width="60" height="80" rx="10" fill="#ff6b6b"/>
  <circle cx="230" cy="220" r="8" fill="white"/>
  <circle cx="230" cy="220" r="4" fill="#333"/>
  <rect x="210" y="250" width="20" height="30" fill="#ff6b6b"/>
  <rect x="250" y="250" width="20" height="30" fill="#ff6b6b"/>
  
  <!-- Environment (grid world) -->
  <rect x="400" y="180" width="200" height="200" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="2"/>
  
  <!-- Grid cells -->
  <g stroke="#cbd5e0" stroke-width="1">
    <line x1="400" y1="220" x2="600" y2="220"/>
    <line x1="400" y1="260" x2="600" y2="260"/>
    <line x1="400" y1="300" x2="600" y2="300"/>
    <line x1="400" y1="340" x2="600" y2="340"/>
    <line x1="440" y1="180" x2="440" y2="380"/>
    <line x1="480" y1="180" x2="480" y2="380"/>
    <line x1="520" y1="180" x2="520" y2="380"/>
    <line x1="560" y1="180" x2="560" y2="380"/>
  </g>
  
  <!-- Rewards and obstacles -->
  <circle cx="450" cy="210" r="8" fill="#4ade80"/>
  <circle cx="550" cy="250" r="8" fill="#4ade80"/>
  <circle cx="470" cy="330" r="8" fill="#ef4444"/>
  <circle cx="530" cy="310" r="8" fill="#ef4444"/>
  
  <!-- Agent path -->
  <path d="M 230 240 Q 300 200 400 220 Q 500 240 550 250" stroke="#ff6b6b" stroke-width="3" fill="none" stroke-dasharray="5,5"/>
  
  <!-- Q-Learning equation -->
  <text x="150" y="350" font-family="serif" font-size="16" fill="#ff6b6b" font-weight="bold">Q(s,a) = Q(s,a) + α[r + γ max Q(s',a') - Q(s,a)]</text>
  
  <!-- Title -->
  <text x="400" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2d3748">强化学习入门</text>
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4a5568">智能体与环境交互学习</text>
  
  <!-- Course badge -->
  <rect x="320" y="520" width="160" height="30" rx="15" fill="#ff6b6b"/>
  <text x="400" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">强化学习</text>
</svg>
