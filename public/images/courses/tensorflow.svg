<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9a9e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fecfef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Floating elements -->
  <circle cx="120" cy="80" r="30" fill="rgba(255,255,255,0.1)"/>
  <circle cx="680" cy="110" r="40" fill="rgba(255,255,255,0.08)"/>
  <circle cx="750" cy="490" r="35" fill="rgba(255,255,255,0.12)"/>
  <circle cx="70" cy="510" r="45" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Main card -->
  <rect x="50" y="100" width="700" height="400" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- TensorFlow logo elements -->
  <!-- TensorFlow symbol -->
  <g transform="translate(200, 200)">
    <rect x="0" y="0" width="40" height="40" fill="#ff6b6b" rx="5"/>
    <rect x="50" y="0" width="40" height="40" fill="#4ecdc4" rx="5"/>
    <rect x="100" y="0" width="40" height="40" fill="#45b7d1" rx="5"/>
    <rect x="25" y="50" width="40" height="40" fill="#96ceb4" rx="5"/>
    <rect x="75" y="50" width="40" height="40" fill="#feca57" rx="5"/>
  </g>
  
  <!-- Neural network architecture -->
  <g stroke="#ff6b6b" stroke-width="2" fill="none">
    <!-- Input layer -->
    <circle cx="400" cy="200" r="12" fill="#ff6b6b"/>
    <circle cx="400" cy="230" r="12" fill="#ff6b6b"/>
    <circle cx="400" cy="260" r="12" fill="#ff6b6b"/>
    
    <!-- Hidden layers -->
    <circle cx="500" cy="210" r="12" fill="#4ecdc4"/>
    <circle cx="500" cy="240" r="12" fill="#4ecdc4"/>
    <circle cx="500" cy="270" r="12" fill="#4ecdc4"/>
    
    <circle cx="600" cy="220" r="12" fill="#45b7d1"/>
    <circle cx="600" cy="250" r="12" fill="#45b7d1"/>
    
    <!-- Output layer -->
    <circle cx="700" cy="235" r="12" fill="#96ceb4"/>
    
    <!-- Connections -->
    <line x1="400" y1="200" x2="500" y2="210"/>
    <line x1="400" y1="230" x2="500" y2="240"/>
    <line x1="400" y1="260" x2="500" y2="270"/>
    <line x1="500" y1="210" x2="600" y2="220"/>
    <line x1="500" y1="240" x2="600" y2="250"/>
    <line x1="600" y1="220" x2="700" y2="235"/>
    <line x1="600" y1="250" x2="700" y2="235"/>
  </g>
  
  <!-- TensorFlow code -->
  <rect x="150" y="320" width="500" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="170" y="345" font-family="monospace" font-size="12" fill="#10b981">import tensorflow as tf</text>
  <text x="170" y="365" font-family="monospace" font-size="12" fill="#fbbf24">model = tf.keras.Sequential([</text>
  <text x="190" y="385" font-family="monospace" font-size="12" fill="#fbbf24">    tf.keras.layers.Dense(128, activation='relu'),</text>
  <text x="190" y="405" font-family="monospace" font-size="12" fill="#fbbf24">    tf.keras.layers.Dropout(0.2),</text>
  <text x="190" y="425" font-family="monospace" font-size="12" fill="#fbbf24">    tf.keras.layers.Dense(10, activation='softmax')</text>
  <text x="170" y="445" font-family="monospace" font-size="12" fill="#fbbf24">])</text>
  
  <!-- Title -->
  <text x="400" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2d3748">TensorFlow 2.0 完全指南</text>
  <text x="400" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4a5568">Google 深度学习框架</text>
  
  <!-- Course badge -->
  <rect x="320" y="520" width="160" height="30" rx="15" fill="#ff6b6b"/>
  <text x="400" y="540" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">TensorFlow</text>
</svg>
