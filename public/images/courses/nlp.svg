<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f8fafc;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  
  <!-- Floating elements -->
  <circle cx="100" cy="90" r="30" fill="rgba(255,255,255,0.1)"/>
  <circle cx="700" cy="110" r="40" fill="rgba(255,255,255,0.08)"/>
  <circle cx="750" cy="490" r="35" fill="rgba(255,255,255,0.12)"/>
  <circle cx="70" cy="510" r="45" fill="rgba(255,255,255,0.06)"/>
  
  <!-- Main card -->
  <rect x="50" y="100" width="700" height="400" rx="20" fill="url(#card)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Text processing elements -->
  <!-- Word cloud -->
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#f093fb" transform="rotate(-15 200 200)">自然语言</text>
  <text x="300" y="180" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f5576c" transform="rotate(10 300 180)">处理</text>
  <text x="400" y="190" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#f093fb" transform="rotate(-5 400 190)">BERT</text>
  <text x="500" y="210" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f5576c" transform="rotate(20 500 210)">Word2Vec</text>
  <text x="350" y="250" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#f093fb" transform="rotate(-10 350 250)">Transformer</text>
  <text x="250" y="280" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#f5576c" transform="rotate(15 250 280)">GPT</text>
  <text x="450" y="300" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#f093fb" transform="rotate(-8 450 300)">注意力机制</text>
  
  <!-- Language processing pipeline -->
  <rect x="150" y="350" width="80" height="40" rx="5" fill="#f093fb" opacity="0.8"/>
  <text x="190" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">分词</text>
  
  <rect x="250" y="350" width="80" height="40" rx="5" fill="#f5576c" opacity="0.8"/>
  <text x="290" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">词性标注</text>
  
  <rect x="350" y="350" width="80" height="40" rx="5" fill="#f093fb" opacity="0.8"/>
  <text x="390" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">句法分析</text>
  
  <rect x="450" y="350" width="80" height="40" rx="5" fill="#f5576c" opacity="0.8"/>
  <text x="490" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white">语义理解</text>
  
  <!-- Arrows between pipeline steps -->
  <path d="M 230 370 L 250 370" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 330 370 L 350 370" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 430 370 L 450 370" stroke="#666" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
  </defs>
  
  <!-- Title -->
  <text x="400" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#2d3748">NLP 实战</text>
  <text x="400" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4a5568">从 Word2Vec 到 BERT</text>
  
  <!-- Course badge -->
  <rect x="320" y="450" width="160" height="30" rx="15" fill="#f093fb"/>
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">自然语言处理</text>
</svg>
