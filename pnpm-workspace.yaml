packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@prisma/client': false
  '@prisma/engines': false
  '@scarf/scarf': false
  bcrypt: false
  prisma: false

onlyBuiltDependencies:
  - bcrypt
  - prisma
  - '@prisma/client'
  - '@prisma/engines'
  - esbuild
  - protobufjs

overrides:
  tar: '>=7.5.11'
  js-yaml: '>=4.2.0'
  multer: '>=2.2.0'
  vite: '>=6.4.3'
  vitest: '>=3.2.6'
  # P0 2026-07-23 安全加固: 4 个依赖漏洞修复
  # - semver 6.0-6.3.1 ReDoS (经 bcrypt / jest chain)
  # - tmp <0.2.6 path traversal (经 @nestjs/cli chain)
  # - fast-uri 3.0-3.1.3 host confusion ReDoS (经 @nestjs/cli chain)
  semver: '>=6.3.1'
  tmp: '>=0.2.6'
  fast-uri: '>=3.1.4'
