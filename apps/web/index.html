<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Academy</title>
    <!--
      Security: SPA CSP (后端 helmet 只覆盖 API 响应, SPA 自身要 meta CSP).
      与 apps/api/src/main.ts helmet CSP 保持一致 + dev HVR ws/ws 放宽.
      关键防护:
        - default-src 'self' (禁 inline, 禁外域)
        - script-src 'self' (禁 inline script, 禁 eval)
        - object-src 'none' (禁 <object>/<embed>)
        - frame-ancestors 'none' (禁 iframe embed)
        - base-uri 'self' (禁 <base> 劫持)
      dev HMR 需要的 connect-src ws://localhost:* / http://localhost:* 在 dev mode
      由 Vite 注入;prod build 不需要. 这里用静态 meta, prod 安全, dev 跑不动时
      用 Vite plugin transformIndexHtml 放宽.
      2026-07-23 安全加固.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: https://coresg-normal.trae.ai;
      font-src 'self' data:;
      connect-src 'self' https://generativelanguage.googleapis.com;
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
    ">
    <link rel="stylesheet" href="/index.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
